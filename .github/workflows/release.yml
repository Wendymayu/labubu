name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            platform_tag: linux_x86_64
            binary_name: labubu
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            platform_tag: linux_aarch64
            binary_name: labubu
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform_tag: win_amd64
            binary_name: labubu.exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            platform_tag: macosx_10_9_x86_64
            binary_name: labubu
          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform_tag: macosx_11_0_arm64
            binary_name: labubu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Determine version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      - name: Set Python package version
        shell: bash
        run: |
          # sed -i.bak + rm is portable across GNU sed (Linux) and BSD sed (macOS),
          # where bare `sed -i 's/.../'` is interpreted as a backup suffix.
          sed -i.bak 's/^version = .*/version = "${{ env.VERSION }}"/' labubu-python/pyproject.toml
          sed -i.bak 's/^__version__ = .*/__version__ = "${{ env.VERSION }}"/' labubu-python/labubu/__init__.py
          rm -f labubu-python/pyproject.toml.bak labubu-python/labubu/__init__.py.bak
          echo "pyproject version:" && grep '^version' labubu-python/pyproject.toml

      - name: Build Go binary
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-X main.Version=${{ env.VERSION }}" \
            -o "bin/${{ matrix.binary_name }}" ./cmd/labubu

      - name: Prepare Python package
        shell: bash
        run: |
          mkdir -p labubu-python/labubu/bin
          cp "bin/${{ matrix.binary_name }}" "labubu-python/labubu/bin/"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python build tools
        run: pip install build

      - name: Build platform-specific wheel
        working-directory: labubu-python
        shell: bash
        run: |
          python -m build --wheel
          # Fix Root-Is-Purelib and platform tag directly in the zip
          python -c "
          import glob, zipfile, os, shutil
          whl = glob.glob('dist/*.whl')[0]
          tmp = whl + '.tmp'
          platform_tag = '${{ matrix.platform_tag }}'
          with zipfile.ZipFile(whl, 'r') as zin:
              with zipfile.ZipFile(tmp, 'w', zipfile.ZIP_DEFLATED) as zout:
                  for item in zin.infolist():
                      data = zin.read(item.filename)
                      if item.filename.endswith('/WHEEL') and '/METADATA' not in item.filename:
                          text = data.decode('utf-8')
                          text = text.replace('Root-Is-Purelib: true', 'Root-Is-Purelib: false')
                          text = text.replace('Tag: py3-none-any', f'Tag: py3-none-{platform_tag}')
                          data = text.encode('utf-8')
                      zout.writestr(item, data)
          os.remove(whl)
          # Rename to match the new tag
          parts = os.path.basename(whl).replace('-py3-none-any.whl', f'-py3-none-{platform_tag}.whl')
          shutil.move(tmp, os.path.join('dist', parts))
          "

      - name: Smoke test
        if: (matrix.goos == 'linux' && matrix.goarch == 'amd64') || (matrix.goos == 'windows' && matrix.goarch == 'amd64') || (matrix.goos == 'darwin' && matrix.goarch == 'arm64')
        shell: bash
        run: |
          pip install labubu-python/dist/*.whl
          labubu version
          labubu serve --port 19876 &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:19876/api/health
          echo ""
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: labubu-python/dist/*.whl

      - name: Stage raw binary
        shell: bash
        run: |
          mkdir -p staging
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          cp "bin/${{ matrix.binary_name }}" "staging/labubu-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"

      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: staging/labubu-*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/labubu-*

  publish-test:
    needs: build
    runs-on: ubuntu-latest
    # Publish pre-release (rc) tags to TestPyPI for install verification.
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, 'rc') && vars.TEST_PYPI_ENABLED == 'true'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Publish final (non-rc) tags to PyPI. rc tags go to TestPyPI only.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'rc') && vars.PYPI_ENABLED == 'true'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
