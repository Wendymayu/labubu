name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            platform_tag: linux_x86_64
            binary_name: labubu
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            platform_tag: linux_aarch64
            binary_name: labubu
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform_tag: win_amd64
            binary_name: labubu.exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            platform_tag: macosx_10_9_x86_64
            binary_name: labubu
          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform_tag: macosx_11_0_arm64
            binary_name: labubu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Determine version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      - name: Build Go binary
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-X main.Version=${{ env.VERSION }}" \
            -o "bin/${{ matrix.binary_name }}" ./cmd/labubu

      - name: Prepare Python package
        shell: bash
        run: |
          mkdir -p labubu-python/labubu/bin
          cp "bin/${{ matrix.binary_name }}" "labubu-python/labubu/bin/"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python build tools
        run: pip install build wheel

      - name: Build platform-specific wheel
        working-directory: labubu-python
        shell: bash
        run: |
          python -m build --wheel
          # Fix Root-Is-Purelib for platform wheel (use Python instead of sed for cross-OS compat)
          whl_file=$(ls dist/*.whl)
          wheel unpack "$whl_file" -d dist/unpacked
          python -c "
          import glob, os
          wheel_file = glob.glob('dist/unpacked/*/WHEEL')[0]
          with open(wheel_file, 'r') as f: content = f.read()
          with open(wheel_file, 'w') as f: f.write(content.replace('Root-Is-Purelib: true', 'Root-Is-Purelib: false'))
          "
          rm "$whl_file"
          wheel pack dist/unpacked/*/ -d dist/
          rm -rf dist/unpacked/
          # Tag with platform
          wheel tags --platform-tag ${{ matrix.platform_tag }} dist/*.whl
          rm -f dist/*-py3-none-any.whl

      - name: Smoke test
        if: matrix.goarch == 'amd64'
        shell: bash
        run: |
          pip install labubu-python/dist/*.whl
          labubu version
          labubu serve --port 19876 &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:19876/api/health
          echo ""
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: labubu-python/dist/*.whl

      - name: Stage raw binary
        shell: bash
        run: |
          mkdir -p staging
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          cp "bin/${{ matrix.binary_name }}" "staging/labubu-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"

      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: staging/labubu-*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/labubu-*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && vars.PYPI_ENABLED == 'true'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
